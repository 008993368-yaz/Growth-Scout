name: Release validation

on:
  push:
    tags:
      - "v*"

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate markdown links
        run: node scripts/validate-links.mjs
